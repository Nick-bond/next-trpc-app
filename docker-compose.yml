version: '3.8'
services:
  mongo:
    image: mongo
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    env_file:
      - .env
    ports:
      - 3000:3000
    environment:
      MONGODB_URI: mongodb://mongo:27017/todo-app
    depends_on:
      - mongo


volumes:
  mongo-data: